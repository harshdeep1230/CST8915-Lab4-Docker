version: '3.8'
services:
  web:
    build: .
    ports:
      - "80:5000"
    depends_on:
      - redis
    environment:
      - FLASK_ENV=development
    networks:
      - app-network
  redis:
    image: redis:7-alpine
    networks:
      - app-network
    volumes:
      - redis-data:/data
networks:
  app-network:
    driver: bridge
volumes:
  redis-data:
